changelog:
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement

    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix

    - title: 📦 Dependencies
      labels:
        - dependencies

    - title: 🧹 Refactoring & Cleanup
      labels:
        - refactor
        - cleanup
        - chore

    - title: 📚 Documentation
      labels:
        - documentation

    - title: Other Changes
      labels:
        - "*"