name: Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Build and upload Image
    runs-on: ubuntu-latest

    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      owner_lc: ${{ steps.meta.outputs.owner_lc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tags + lowercase owner
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"

          # Always build/push immutable sha tag
          echo "sha_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

          # If this is a Git tag push (refs/tags/vX.Y.Z), also push that version tag
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "version_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image (sha tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.owner_lc }}/tankify-frontend:${{ steps.meta.outputs.sha_tag }}

      - name: Tag sha image as version tag (only for v* tags)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ steps.meta.outputs.owner_lc }}/tankify-frontend"
          SHA_TAG="${{ steps.meta.outputs.sha_tag }}"
          VERSION_TAG="${{ steps.meta.outputs.version_tag }}"

          echo "Retag ${IMAGE}:${SHA_TAG} -> ${IMAGE}:${VERSION_TAG}"
          docker pull "${IMAGE}:${SHA_TAG}"
          docker tag  "${IMAGE}:${SHA_TAG}" "${IMAGE}:${VERSION_TAG}"
          docker push "${IMAGE}:${VERSION_TAG}"

      - name: Tag version release as latest (only for v* tags)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ steps.meta.outputs.owner_lc }}/tankify-frontend"
          SHA_TAG="${{ steps.meta.outputs.sha_tag }}"

          echo "Retag ${IMAGE}:${SHA_TAG} -> ${IMAGE}:latest"
          docker pull "${IMAGE}:${SHA_TAG}"
          docker tag  "${IMAGE}:${SHA_TAG}" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"

  deploy_dev:
    name: Auto deploy to dev
    needs: release
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    with:
      stage: dev
      version: ${{ needs.release.outputs.sha_tag }}
    secrets: inherit

